name: Deploy to NAS

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'docs/modules/**'
      - 'deploy/**'
      - '.github/workflows/deploy-nas.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Validate NAS SSH key secret
        env:
          NAS_SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
        run: |
          if [ -z "$NAS_SSH_KEY" ]; then
            echo "::error::Missing GitHub Actions repository secret NAS_SSH_KEY."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$NAS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -P '' -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::NAS_SSH_KEY must be a valid unencrypted SSH private key."
            exit 1
          fi

      - name: Setup SSH via Cloudflare Tunnel
        run: |
          cat >> ~/.ssh/config << 'EOF'
          Host nas
            HostName ssh.henry780930.com
            User sniperHK
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            BatchMode yes
            ProxyCommand cloudflared access ssh --hostname %h
            ControlMaster auto
            ControlPath /tmp/ssh-nas-%r
            ControlPersist 600
          EOF

      - name: Test SSH connection
        run: ssh -o BatchMode=yes -o ConnectTimeout=30 nas "echo 'SSH via Cloudflare Tunnel OK'"

      - name: Ensure remote directory
        run: ssh nas "mkdir -p /volume1/docker/cit-workshop"

      - name: Sync files to NAS
        run: |
          tar czf /tmp/deploy.tar.gz \
            web/src/ web/public/ web/package.json web/package-lock.json \
            web/tsconfig.json web/vite.config.ts web/index.html \
            docs/modules/ \
            deploy/
          ssh nas "cat > /volume1/docker/cit-workshop/deploy.tar.gz" < /tmp/deploy.tar.gz
          ssh nas "cd /volume1/docker/cit-workshop && tar xzf deploy.tar.gz && rm deploy.tar.gz"

      - name: Build and restart
        run: |
          ssh nas "cd /volume1/docker/cit-workshop && \
            /usr/local/bin/docker compose -f deploy/docker-compose.yml build && \
            /usr/local/bin/docker compose -f deploy/docker-compose.yml up -d"

      - name: Health check
        run: |
          sleep 8
          STATUS=$(ssh nas "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8904/" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Deploy successful — http://sniperhk920:8904/"
          else
            echo "❌ Health check failed (HTTP $STATUS)"
            ssh nas "/usr/local/bin/docker compose -f /volume1/docker/cit-workshop/deploy/docker-compose.yml logs --tail 20" || true
            exit 1
          fi
